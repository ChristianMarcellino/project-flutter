name: localmart
description: "A local marketplace application built with Flutter."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0


dependencies:
  app_links: ^7.1.1
  cached_network_image: ^3.4.1
  cloud_firestore: ^6.3.0
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.2
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_image_compress: ^2.4.0
  flutter_launcher_icons: ^0.14.4
  flutter_local_notifications: ^21.0.0
  geolocator: ^14.0.2
  go_router: ^17.2.3
  google_fonts: ^8.1.0
  http: ^1.6.0
  image_cropper: ^12.2.1
  image_picker: ^1.2.2
  share_plus: ^12.0.2
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - .env
    - assets/
  uses-material-design: true
  
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
